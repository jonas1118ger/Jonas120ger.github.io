<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍺 Bierkarten</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <h1>🍺 Bierkarten</h1>

    <button id="settingsButton" onclick="toggleSettings()">
        ⚙️
    </button>

</header>

<main>

    <div class="deck-area">

        <div id="deck" class="deck">
            🍺
        </div>

        <button id="drawButton">
            Karte ziehen
        </button>

    </div>

    <div id="cardContainer"></div>

</main>


<!-- Einstellungen -->

<div id="settingsOverlay" class="overlay">

    <div class="settingsWindow">

        <div class="settingsHeader">

            <h2>⚙️ Einstellungen</h2>

            <button class="closeButton" onclick="toggleSettings()">
                ✖
            </button>

        </div>

        <hr>

        <h3>Neue Karte</h3>

        <input
            id="titleInput"
            type="text"
            placeholder="Titel">

        <textarea
            id="textInput"
            placeholder="Kartentext"
            rows="5"></textarea>

        <label>

            Kartenfarbe

            <input
                id="colorInput"
                type="color"
                value="#ffffff">

        </label>

        <button onclick="addCard()">
            ➕ Karte hinzufügen
        </button>

        <hr>

        <h3>Karten löschen</h3>

        <select id="deleteSelect"></select>

        <button onclick="deleteCard()">
            🗑️ Karte löschen
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
