<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartenstapel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎴 Kartenstapel</h1>

<div class="deck-area">

    <div id="deck" class="deck">
        🍻
    </div>

    <button id="drawButton">
        Karte ziehen
    </button>

    <hr>

<h2>Karten verwalten</h2>

<input id="titleInput" placeholder="Kartentitel">

<br><br>

<textarea
id="textInput"
placeholder="Kartentext"
rows="4"
cols="40"></textarea>

<br><br>

<input
type="color"
id="colorInput"
value="#ffffff">

<button onclick="addCard()">
Karte hinzufügen
</button>

<br><br>

<select id="deleteSelect"></select>

<button onclick="deleteCard()">
Karte löschen
</button>

</div>

<div id="cardContainer"></div>

<script src="script.js"></script>

</body>
</html>
